name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install
      - name: Typecheck
        run: pnpm tsc --noEmit
      - name: ESLint
        run: pnpm eslint src
      - name: Vitest
        run: pnpm test

  sync-to-hub:
    needs: [test-and-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Install git-lfs
        run: |
          sudo apt-get install git-lfs
          git lfs install
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://shubhjn:$HF_TOKEN@huggingface.co/spaces/shubhjn/autoloop main