name: AutoLoop CI/CD

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Doctor
        run: pnpm doctor:ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

      - name: Component tests
        run: pnpm test:components

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Automation tests
        run: pnpm test:e2e

  deploy-hugging-face:
    if: github.event_name != 'pull_request'
    needs: [quality]
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install git-lfs
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Push to Hugging Face Space
        if: env.HF_TOKEN != '' && env.HF_SPACE_ID != ''
        run: |
          git config --global user.email "ci@autoloop.ai"
          git config --global user.name "AutoLoop CI"
          git push --force https://hf:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID} HEAD:main

